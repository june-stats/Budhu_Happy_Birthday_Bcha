<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Surprise ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at 30% 10%, #ffe6f0, #ffb6c7);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        /* Animated floating particles */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle 8s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* Envelope/Package container */
        .gift-container {
            position: relative;
            width: 85%;
            max-width: 380px;
            height: auto;
            z-index: 20;
            perspective: 1200px;
        }

        /* Paper wrapper (the tearable envelope) */
        .paper-overlay {
            position: relative;
            width: 100%;
            background: #fef9e8;
            background-image: repeating-linear-gradient(45deg, rgba(210, 180, 140, 0.1) 0px, rgba(210, 180, 140, 0.1) 2px, transparent 2px, transparent 8px);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), inset 0 1px 4px rgba(255, 255, 255, 0.8);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Tear lines (left and right halves) */
        .tear-half {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: #fef9e8;
            background-image: repeating-linear-gradient(45deg, rgba(210, 180, 140, 0.15) 0px, rgba(210, 180, 140, 0.15) 2px, transparent 2px, transparent 8px);
            transition: transform 1.2s cubic-bezier(0.76, 0, 0.24, 1), opacity 0.8s ease;
            will-change: transform;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .tear-left {
            left: 0;
            border-right: 2px dashed rgba(200, 160, 110, 0.4);
            border-radius: 32px 0 0 32px;
        }

        .tear-right {
            right: 0;
            border-left: 2px dashed rgba(200, 160, 110, 0.4);
            border-radius: 0 32px 32px 0;
        }

        /* Torn state */
        .torn-left {
            transform: translateX(-110%) rotate(-12deg);
            opacity: 0;
        }

        .torn-right {
            transform: translateX(110%) rotate(12deg);
            opacity: 0;
        }

        /* Content inside the paper (hidden until torn) */
        .secret-content {
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.6s ease 0.3s;
            padding: 2rem;
            text-align: center;
        }

        .show-secret {
            opacity: 1;
            transform: scale(1);
        }

        /* Sparkle button / text */
        .reveal-hint {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 4px;
            color: #d45a7a;
            background: rgba(255,255,240,0.7);
            backdrop-filter: blur(4px);
            padding: 10px;
            border-radius: 40px;
            width: 80%;
            margin: 0 auto;
            z-index: 25;
            pointer-events: none;
            animation: gentlePulse 1.8s infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.7; transform: scale(1); text-shadow: 0 0 0px #ff85a2; }
            50% { opacity: 1; transform: scale(1.03); text-shadow: 0 0 8px #ff85a2; }
        }

        /* Shimmer effect on tear */
        .shimmer {
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            pointer-events: none;
            z-index: 20;
            transition: left 0.7s ease;
        }

        .shimmer-active {
            left: 150%;
        }

        /* Floating hearts after tear */
        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 100;
            animation: floatHeart 1.5s ease-out forwards;
        }

        @keyframes floatHeart {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.3); opacity: 0; }
        }

        /* Cute illustration inside */
        .inner-gift {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .reveal-hint { font-size: 0.9rem; bottom: 12px; }
            .secret-content { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Audio -->
    <audio id="tearSound" src="sounds/paper_tearing.mp3" preload="auto"></audio>
    <audio id="magicChime" src="sounds/magic_chime.mp3" preload="auto"></audio>

    <!-- Dynamic particles background -->
    <div id="particles-container"></div>

    <div class="gift-container">
        <div class="paper-overlay" id="paperOverlay">
            <div class="tear-half tear-left" id="tearLeft"></div>
            <div class="tear-half tear-right" id="tearRight"></div>
            <div class="shimmer" id="shimmer"></div>

            <div class="secret-content" id="secretContent">
                <div class="inner-gift">
                    <div class="text-7xl mb-3 animate-bounce">🎁✨</div>
                    <h2 class="text-3xl font-bold text-pink-600 font-['Dancing_Script']">A Surprise for You...</h2>
                    <div class="w-20 h-1 bg-pink-300 rounded-full my-2"></div>
                    <p class="text-gray-600 text-sm">Something special is waiting inside.</p>
                    <div class="mt-4 bg-pink-100 rounded-full px-4 py-2 text-pink-500 text-xs font-bold">Just for you ❤️</div>
                </div>
            </div>

            <div class="reveal-hint" id="hintText">
                ✨ TAP ANYWHERE TO TEAR OPEN ✨
            </div>
        </div>
    </div>

    <script>
        let isTearing = false;

        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles-container');
            const particleCount = 40;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 8 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = Math.random() * 6 + 4 + 's';
                particle.style.background = `rgba(255, 133, 162, ${Math.random() * 0.4 + 0.2})`;
                container.appendChild(particle);
            }
        }

        // Spawn floating hearts after tear
        function spawnHearts(count) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('floating-heart');
                    heart.innerHTML = ['❤️', '💖', '💗', '🌸', '✨'][Math.floor(Math.random() * 5)];
                    heart.style.left = Math.random() * 80 + 10 + '%';
                    heart.style.bottom = '20%';
                    heart.style.fontSize = (Math.random() * 20 + 18) + 'px';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 1500);
                }, i * 80);
            }
        }

        // Add a magical background flash
        function flashBackground() {
            const body = document.body;
            body.style.transition = 'background 0.3s';
            body.style.background = 'radial-gradient(circle at 30% 10%, #ffdde1, #ff9a9e)';
            setTimeout(() => {
                body.style.background = 'radial-gradient(circle at 30% 10%, #ffe6f0, #ffb6c7)';
            }, 400);
        }

        // Tear animation
        function tearPaper() {
            if (isTearing) return;
            isTearing = true;

            const leftHalf = document.getElementById('tearLeft');
            const rightHalf = document.getElementById('tearRight');
            const hint = document.getElementById('hintText');
            const shimmer = document.getElementById('shimmer');
            const secretDiv = document.getElementById('secretContent');
            const tearSound = document.getElementById('tearSound');
            const magicSound = document.getElementById('magicChime');

            // Play tear sound
            tearSound.play().catch(e => console.log("Audio play blocked"));
            
            // Shimmer effect
            shimmer.classList.add('shimmer-active');
            
            // Hide hint text
            hint.style.opacity = '0';
            hint.style.pointerEvents = 'none';
            
            // Tear halves fly away
            leftHalf.classList.add('torn-left');
            rightHalf.classList.add('torn-right');
            
            // Show secret content with fade-in
            setTimeout(() => {
                secretDiv.classList.add('show-secret');
                // Play magical chime
                magicSound.play().catch(e => console.log);
                // Flash background
                flashBackground();
                // Spawn hearts
                spawnHearts(20);
            }, 200);
            
            // **CHANGED: Wait 3 seconds (3000ms) before redirecting**
            setTimeout(() => {
                window.location.href = 'landing.html';
            }, 3000);  // Was 1300, now 3000
        }

        // Initialize
        window.onload = () => {
            createParticles();
            // Attach click/tap listener to body
            document.body.addEventListener('click', tearPaper);
            document.body.addEventListener('touchstart', tearPaper);
        };
    </script>
</body>
</html>
