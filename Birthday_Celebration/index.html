<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Surprise ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fff5f7;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #paper-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 100;
        }

        .paper-half {
            position: absolute;
            top: 0;
            width: 55%;
            height: 100%;
            background-color: #ffffff;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            display: flex;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1), opacity 1s ease;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
        }

        .left-half {
            left: 0;
            justify-content: flex-end;
            clip-path: polygon(0% 0%, 100% 0%, 95% 5%, 100% 10%, 92% 15%, 100% 20%, 94% 25%, 100% 30%, 91% 35%, 100% 40%, 96% 45%, 100% 50%, 93% 55%, 100% 60%, 95% 65%, 100% 70%, 92% 75%, 100% 80%, 96% 85%, 100% 90%, 94% 95%, 100% 100%, 0% 100%);
        }

        .right-half {
            right: 0;
            justify-content: flex-start;
            clip-path: polygon(5% 0%, 100% 0%, 100% 100%, 5% 100%, 0% 95%, 6% 90%, 0% 85%, 4% 80%, 0% 75%, 8% 70%, 0% 65%, 5% 60%, 0% 55%, 7% 50%, 0% 45%, 4% 40%, 0% 35%, 9% 30%, 0% 25%, 6% 20%, 0% 15%, 8% 10%, 0% 5%);
        }

        .reveal-text {
            position: absolute;
            width: 100vw;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff85a2;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 110;
            transition: opacity 0.5s ease;
        }

        .torn-left {
            transform: translateX(-110%) rotate(-5deg);
            opacity: 0;
        }

        .torn-right {
            transform: translateX(110%) rotate(5deg);
            opacity: 0;
        }

        .fade-out {
            opacity: 0;
        }

        .animate-pulse-slow {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .preview-content {
            text-align: center;
            color: #ffd1d1;
        }
        
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body onclick="tearPaper()">

    <audio id="tearSound" src="sounds/paper_tearing.mp3" preload="auto"></audio>

    <div class="preview-content">
        <h2 class="text-4xl">💖</h2>
    </div>

    <div id="text-hint" class="reveal-text animate-pulse-slow">
        Tap to Reveal
    </div>

    <div id="paper-wrapper">
        <div id="left" class="paper-half left-half"></div>
        <div id="right" class="paper-half right-half"></div>
    </div>

    <script>
        let isTearing = false;

        function navigateTo(url) {
            const link = document.createElement('a');
            link.href = url;
            document.body.appendChild(link);
            link.click();
        }

        function tearPaper() {
            if (isTearing) return;
            isTearing = true;

            const left = document.getElementById('left');
            const right = document.getElementById('right');
            const hint = document.getElementById('text-hint');
            const audio = document.getElementById('tearSound');

            // 1. Play the tearing sound
            audio.play().catch(error => {
                console.log("Audio play failed:", error);
            });

            // 2. Hide text
            hint.classList.add('fade-out');

            // 3. Trigger tear animation
            left.classList.add('torn-left');
            right.classList.add('torn-right');

            // 4. Redirect after animation finishes
            setTimeout(() => {
                navigateTo('landing.html');
            }, 1000);
        }
    </script>
</body>
</html>
