<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Princess! ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-pink: #fecfef;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #fff5f7, #fecfef, #ffdde1, #fff5f7);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            transition: background 1s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .font-cursive {
            font-family: 'Pacifico', cursive;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2.5rem;
            width: 100%;
            max-width: 400px;
        }

        .heart {
            position: absolute;
            color: var(--primary-pink);
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Enhanced Candle & Fire */
        .candle {
            width: 14px;
            height: 45px;
            background: linear-gradient(to right, #ffd166, #ffeb3b, #ffd166);
            margin: 0 auto;
            position: relative;
            border-radius: 6px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        .flame-container {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 30px;
        }

        .flame {
            width: 16px;
            height: 26px;
            background: linear-gradient(to bottom, #ff4d6d, #ff9a9e, #fff);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            bottom: 0;
            left: 2px;
            animation: flicker 0.6s infinite alternate;
            box-shadow: 0 0 20px #ff4d6d, 0 0 40px #ff9a9e;
        }

        .flame-inner {
            width: 8px;
            height: 12px;
            background: #fff;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            bottom: 4px;
            left: 6px;
            opacity: 0.6;
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-3deg); opacity: 0.8; }
            50% { transform: scale(1.1) rotate(1deg); opacity: 1; }
            100% { transform: scale(1.05) rotate(3deg); opacity: 0.9; }
        }

        .cake-pulse {
            animation: cakePulse 0.5s ease-out;
        }

        @keyframes cakePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        canvas#confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .pop-in {
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .hidden-btn {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .show-btn {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="p-4">

    <!-- Sounds (Paths adjusted to match your structure) -->
    <audio id="cracker" src="sounds/crackers.mp3" preload="auto"></audio>
    <audio id="birthday_singing" src="sounds/birthday_singing.mp3" preload="auto" loop></audio>

    <canvas id="confetti-canvas"></canvas>

    <div class="z-10 flex flex-col items-center justify-center text-center p-8 glass-card shadow-2xl pop-in" id="mainCard">
        
        <div class="mb-4">
            <h2 class="text-5xl font-cursive text-pink-600 drop-shadow-sm">Happy Birthday!</h2>
            <p class="text-pink-400 font-bold tracking-widest mt-2 uppercase text-sm">To my favorite person</p>
        </div>

        <div id="cake-wrapper" class="relative my-10 cursor-pointer group transition-transform" onclick="blowCandle()">
            <div id="candle-flame" class="flame-container">
                <div class="flame"></div>
                <div class="flame-inner"></div>
            </div>
            <div class="candle"></div>
            <div class="w-44 h-28 bg-pink-200 rounded-t-2xl mx-auto relative shadow-md border-b-4 border-pink-300">
                <div class="absolute top-6 left-0 w-full h-4 bg-white/30"></div>
                <div class="absolute bottom-4 left-0 w-full flex justify-around px-4">
                    <span class="text-2xl">🍓</span>
                    <span class="text-2xl">🍓</span>
                    <span class="text-2xl">🍓</span>
                </div>
            </div>
            <div class="w-52 h-12 bg-white rounded-xl mx-auto shadow-lg -mt-2 flex items-center justify-center border-2 border-pink-50">
                <span id="instruction-text" class="text-pink-500 font-bold text-xs tracking-tighter">TAP TO BLOW CANDLE 🎂</span>
            </div>
        </div>

        <div class="bg-white/50 p-6 rounded-[2rem] shadow-inner mb-8 border border-white/40">
            <p class="text-gray-700 text-lg leading-relaxed italic font-medium">
                "You make every single day brighter just by being in it. Today, the world celebrates <span class="text-pink-500 font-bold">YOU</span>!"
            </p>
        </div>

        <!-- Initially Hidden Button -->
        <div class="w-full hidden-btn" id="letterBtn">
            <a href="letter.html" class="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-pink-200 active:scale-95 transition-transform flex items-center justify-center gap-3 no-underline">
                <span>💌</span> Read My Letter
            </a>
        </div>
        
        <p class="mt-8 text-pink-300 text-[10px] font-bold tracking-[0.3em] uppercase">Infinite Love for You</p>
    </div>

    <script>
        window.onload = function() {
            // Only play singing music on load, crackers saved for the blow event
            const singingAudio = document.getElementById('birthday_singing');
            singingAudio.play().catch(e => console.log("Singing play blocked by browser."));

            initConfetti();
            animateConfetti();
            setInterval(createHeart, 800);
        };

        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let isCelebrating = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(isBurst = false) {
                this.x = isBurst ? window.innerWidth / 2 : Math.random() * canvas.width;
                this.y = isBurst ? window.innerHeight / 2 : Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * (isBurst ? 10 : 8) + 4;
                this.speedX = (Math.random() * 6 - 3) * (isBurst ? 3 : 1);
                this.speedY = isBurst ? (Math.random() * -10 - 5) : (Math.random() * 3 + 2);
                this.gravity = isBurst ? 0.2 : 0;
                this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 10 - 5;
                this.opacity = 1;
            }
            update() {
                this.speedY += this.gravity;
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
                
                if (!isCelebrating && this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function initConfetti() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }
        }

        function burstConfetti() {
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle(true));
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                // Clean up burst particles that go off screen
                if (p.gravity > 0 && p.y > canvas.height + 100) {
                    particles.splice(index, 1);
                }
            });
            requestAnimationFrame(animateConfetti);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const hearts = ['❤️', '💖', '✨', '🌸', '💝'];
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-5vh';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.opacity = Math.random() * 0.6 + 0.4;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }

        function blowCandle() {
            const flame = document.getElementById('candle-flame');
            const instruction = document.getElementById('instruction-text');
            const crackerAudio = document.getElementById('cracker');
            const letterBtn = document.getElementById('letterBtn');
            const cakeWrapper = document.getElementById('cake-wrapper');
            
            if (flame.style.display !== 'none') {
                // 1. Play Cracker Sound
                crackerAudio.play().catch(e => console.log("Sound error:", e));

                // 2. Visual Feedback
                flame.style.display = 'none';
                instruction.innerHTML = "WISH GRANTED! 🥳";
                instruction.classList.add('text-pink-600', 'animate-bounce');
                cakeWrapper.classList.add('cake-pulse');
                
                // 3. Trigger Burst Animation
                isCelebrating = true;
                burstConfetti();
                
                // Shimmer background effect
                document.body.style.background = 'linear-gradient(-45deg, #ff85a2, #fecfef, #ffd166, #fff5f7)';
                document.body.style.backgroundSize = '400% 400%';

                // 4. Show the hidden button
                setTimeout(() => {
                    letterBtn.classList.add('show-btn');
                }, 1000);

                // 5. Heavy heart rain
                for(let i = 0; i < 30; i++) {
                    setTimeout(createHeart, i * 100);
                }
            }
        }
    </script>
</body>
</html>
