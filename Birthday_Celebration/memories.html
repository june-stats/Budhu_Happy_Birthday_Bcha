<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Journey 📸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Pacifico&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(-45deg, #fff5f7, #fecfef, #ffdde1, #fff5f7);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2rem;
            padding: 1.5rem;
            width: 90%;
            max-width: 500px;
            text-align: center;
            margin: 2rem auto;
            position: sticky;
            top: 1rem;
            z-index: 50;
            box-shadow: 0 8px 32px rgba(255, 133, 162, 0.1);
        }

        /* Journey Path Styles */
        .journey-container {
            position: relative;
            padding: 2rem 1rem 10rem 1rem;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .path-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .dotted-path {
            fill: none;
            stroke: #ff85a2;
            stroke-width: 3;
            stroke-dasharray: 10, 10;
            stroke-linecap: round;
            opacity: 0.6;
        }

        .animated-trail {
            fill: none;
            stroke: #ff4d6d;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            transition: stroke-dashoffset 0.1s linear;
        }

        /* Polaroid Style */
        .memory-item {
            position: relative;
            z-index: 10;
            margin-bottom: 8rem;
            width: 100%;
            display: flex;
        }

        .polaroid {
            background: white;
            padding: 0.8rem 0.8rem 2.5rem 0.8rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 220px;
            width: 70%;
            border: 1px solid #fce4ec;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(30px) scale(0.9);
        }

        .polaroid.reveal {
            opacity: 1;
            transform: translateY(0) scale(1) rotate(var(--rot));
        }

        .polaroid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            background-color: #fce4ec;
            border-radius: 2px;
        }

        .polaroid-caption {
            font-family: 'Dancing Script', cursive;
            text-align: center;
            font-size: 1.2rem;
            color: #ff4d6d;
            margin-top: 0.8rem;
        }

        .heart {
            position: absolute;
            color: #ff85a2;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .animate-pop {
            animation: pop 1.2s ease-in-out infinite;
        }

        @keyframes pop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div class="glass-header shadow-xl">
        <h1 class="text-2xl font-['Pacifico'] text-pink-500">Our Beautiful Journey</h1>
        <p class="text-gray-600 text-sm italic">Scroll to trace our path...</p>
    </div>

    <div class="journey-container">
        <!-- SVG Path for the dotted line -->
        <svg class="path-svg" preserveAspectRatio="none">
            <path id="mainPath" class="dotted-path" d=""></path>
            <path id="trailPath" class="animated-trail" d=""></path>
        </svg>

        <!-- Memory 1: Left -->
        <div class="memory-item justify-start">
            <div class="polaroid" style="--rot: -3deg">
                <img src="https://picsum.photos/400/400?random=1" alt="Memory 1" onerror="this.src='https://via.placeholder.com/400x400?text=Us'">
                <p class="polaroid-caption">Where it started...</p>
            </div>
        </div>

        <!-- Memory 2: Right -->
        <div class="memory-item justify-end">
            <div class="polaroid" style="--rot: 4deg">
                <img src="https://picsum.photos/400/400?random=2" alt="Memory 2" onerror="this.src='https://via.placeholder.com/400x400?text=Cute'">
                <p class="polaroid-caption">That first date</p>
            </div>
        </div>

        <!-- Memory 3: Left -->
        <div class="memory-item justify-start">
            <div class="polaroid" style="--rot: -2deg">
                <img src="https://picsum.photos/400/400?random=3" alt="Memory 3" onerror="this.src='https://via.placeholder.com/400x400?text=Smile'">
                <p class="polaroid-caption">Your favorite laugh</p>
            </div>
        </div>

        <!-- Memory 4: Right -->
        <div class="memory-item justify-end">
            <div class="polaroid" style="--rot: 5deg">
                <img src="https://picsum.photos/400/400?random=4" alt="Memory 4" onerror="this.src='https://via.placeholder.com/400x400?text=Always'">
                <p class="polaroid-caption">Forever to go</p>
            </div>
        </div>

        <!-- Final Message -->
        <div class="text-center mt-20 pb-20 opacity-0 transition-opacity duration-1000" id="finalMessage">
            <h2 class="text-4xl font-['Pacifico'] text-pink-600 mb-6">Happy Birthday my Cutie Pie! 🎂</h2>
            <p class="text-gray-500 mb-8 italic">Every moment with you is a gift...</p>
            <a href="collage.html" class="animate-pop inline-block bg-pink-500 text-white font-bold py-4 px-10 rounded-full shadow-lg shadow-pink-200 active:scale-90 transition-transform no-underline">
                Let's see the full collage 📸
            </a>
        </div>
    </div>

    <script>
        // Path Generation
        function updatePath() {
            const path = document.getElementById('mainPath');
            const trail = document.getElementById('trailPath');
            const items = document.querySelectorAll('.memory-item');
            const container = document.querySelector('.journey-container');
            const containerRect = container.getBoundingClientRect();

            let d = "";
            items.forEach((item, index) => {
                const polaroid = item.querySelector('.polaroid');
                const rect = polaroid.getBoundingClientRect();
                
                // Get center relative to container
                const x = (rect.left + rect.width / 2) - containerRect.left;
                const y = (rect.top + rect.height / 2) - containerRect.top;

                if (index === 0) {
                    d += `M ${x} ${y}`;
                } else {
                    const prevRect = items[index-1].querySelector('.polaroid').getBoundingClientRect();
                    const prevX = (prevRect.left + prevRect.width / 2) - containerRect.left;
                    const prevY = (prevRect.top + prevRect.height / 2) - containerRect.top;
                    
                    // Add smooth curve between points
                    const cpY = (prevY + y) / 2;
                    d += ` C ${prevX} ${cpY}, ${x} ${cpY}, ${x} ${y}`;
                }
            });

            path.setAttribute('d', d);
            trail.setAttribute('d', d);
            
            // Set path length for animation
            const length = trail.getTotalLength();
            trail.style.strokeDasharray = length;
            trail.style.strokeDashoffset = length;
        }

        // Scroll Animation
        function handleScroll() {
            const trail = document.getElementById('trailPath');
            const length = trail.getTotalLength();
            const container = document.querySelector('.journey-container');
            const containerRect = container.getBoundingClientRect();
            
            // Calculate progress based on how much of the container has passed the viewport
            const windowH = window.innerHeight;
            let progress = (windowH / 2 - containerRect.top) / (containerRect.height - windowH / 2);
            progress = Math.max(0, Math.min(1, progress));

            trail.style.strokeDashoffset = length - (length * progress);

            // Reveal Polaroids
            document.querySelectorAll('.polaroid').forEach(p => {
                const rect = p.getBoundingClientRect();
                if (rect.top < windowH * 0.8) {
                    p.classList.add('reveal');
                }
            });

            // Reveal Final Message
            const finalMsg = document.getElementById('finalMessage');
            const finalRect = finalMsg.getBoundingClientRect();
            if (finalRect.top < windowH * 0.9) {
                finalMsg.classList.add('opacity-100');
            }
        }

        // Floating Hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const hearts = ['❤️', '💖', '✨', '🌸', '💝'];
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-5vh';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.opacity = Math.random() * 0.6 + 0.4;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }

        window.addEventListener('load', () => {
            updatePath();
            handleScroll();
            setInterval(createHeart, 500);
        });
        window.addEventListener('scroll', handleScroll);
        window.addEventListener('resize', updatePath);

    </script>
</body>
</html>
