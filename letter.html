<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Letter for You 💌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Pacifico&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #f3e9de;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/old-paper.png");
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }

        .paper-card {
            background: #fffef7;
            background-image: radial-gradient(circle at 25% 40%, rgba(210, 180, 140, 0.05) 2%, transparent 2.5%);
            background-size: 28px 28px;
            border-radius: 12px;
            box-shadow: 0 20px 35px rgba(100, 70, 40, 0.2), inset 0 1px 0 rgba(255,255,240,0.8);
            width: 100%;
            max-width: 560px;
            padding: 2rem 1.8rem;
            position: relative;
            z-index: 10;
            border: 1px solid #e8d8b0;
        }

        .paper-card::before {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            border-width: 0 30px 30px 0;
            border-style: solid;
            border-color: #f0e2c5 #fff;
            box-shadow: -2px 2px 3px rgba(0,0,0,0.03);
            border-radius: 0 0 0 8px;
        }

        .typewriter-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.45rem;
            line-height: 1.65;
            color: #4a3728;
            text-align: left;
            min-height: 320px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            margin-left: 2px;
            background-color: #d45a7a;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .floating-heart {
            position: absolute;
            pointer-events: none;
            font-size: 1.2rem;
            animation: floatUp 4s ease-out forwards;
            z-index: 20;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.6); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.2); opacity: 0; }
        }

        .single-btn {
            background: linear-gradient(135deg, #ff85a2, #ff5f7e);
            box-shadow: 0 6px 18px rgba(255, 95, 126, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .single-btn:active {
            transform: scale(0.96);
        }

        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Background music (loops at 25% volume) -->
    <audio id="bgMusic" src="sounds/background_music.mp3" loop preload="auto"></audio>
    <!-- Spoken transcription (plays once when button clicked) -->
    <audio id="transcribeAudio" src="sounds/letter_transcribe.mp3" preload="auto"></audio>

    <div class="paper-card relative z-10">
        <div class="absolute -top-4 -left-3 text-4xl transform -rotate-12 opacity-70">✉️</div>
        
        <div class="text-center mb-6 border-b border-amber-200 pb-3">
            <h2 class="font-['Pacifico'] text-3xl text-pink-600">A little note...</h2>
            <p class="text-xs text-amber-600 mt-1 tracking-wider">✨ for the prettiest girl ✨</p>
        </div>

        <div id="typewriterContainer" class="relative min-h-[350px] bg-white/40 rounded-xl p-4 shadow-inner">
            <div id="letterText" class="typewriter-text"></div>
            <div id="typingCursor" class="cursor hidden"></div>
        </div>

        <div class="flex justify-center mt-8">
            <button id="startBtn" class="single-btn text-white font-bold py-3 px-8 rounded-full shadow-lg flex items-center gap-2 text-lg">
                <span>💌</span> Open the Letter
            </button>
        </div>

        <div id="navLinks" class="mt-10 text-center opacity-0 transition-all duration-700 flex flex-col items-center gap-3">
            <a href="memories.html" class="inline-flex items-center gap-2 bg-pink-500 text-white py-3 px-8 rounded-full font-bold shadow-lg active:scale-95 transition-transform no-underline">
                <span>📸</span> Our Memories
            </a>
            <a href="celebrate.html" class="text-pink-400 text-[11px] font-bold tracking-wider hover:text-pink-500 transition no-underline">
                ← Back to Cake
            </a>
        </div>
    </div>

    <script>
        const fullLetter = `Dearest Junu 💖,

From the moment you entered my life, everything started feeling a little more colorful and a lot more beautiful.

It's hard to put into words how much you mean to me, but I hope this little surprise gives you a glimpse into my heart.

You aren't just the prettiest girl I've ever seen; you have the most beautiful soul I've ever known.

Every smile of yours is a celebration, and every laugh is my favorite song.

I want to be there for every birthday, every dream, and every single moment in between.

With all my love,
Always Yours ❤️`;

        const startBtn = document.getElementById('startBtn');
        const letterDiv = document.getElementById('letterText');
        const cursorSpan = document.getElementById('typingCursor');
        const navLinks = document.getElementById('navLinks');
        const bgMusic = document.getElementById('bgMusic');
        const transcribeAudio = document.getElementById('transcribeAudio');

        let typingInterval = null;
        let currentIndex = 0;
        let hasStarted = false;

        // --- 1. Background music: set volume to 25% and attempt autoplay on page load ---
        bgMusic.volume = 0.05;  // 25% volume

        function attemptAutoPlayBackground() {
            bgMusic.play().then(() => {
                console.log("Background music started automatically.");
            }).catch((err) => {
                console.log("Background music autoplay blocked (browser restriction). It will remain silent unless user interacts.");
                // No forced click – we respect user's wish for no extra clicks.
            });
        }

        // Start background music as soon as the page loads
        window.addEventListener('load', attemptAutoPlayBackground);
        // Also try immediately if DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', attemptAutoPlayBackground);
        } else {
            attemptAutoPlayBackground();
        }

        // --- 2. Letter experience (starts only when button is clicked) ---
        function startExperience() {
            if (hasStarted) return;
            hasStarted = true;

            startBtn.disabled = true;
            startBtn.style.opacity = '0.6';
            startBtn.innerHTML = '<span>✨</span> Writing your letter...';

            // Play spoken transcription (only on button click)
            transcribeAudio.play().catch(e => console.log("Transcription audio blocked:", e));

            // Start typewriter effect
            startTyping();
        }

        function startTyping() {
            letterDiv.innerHTML = '';
            currentIndex = 0;
            cursorSpan.classList.remove('hidden');

            typingInterval = setInterval(() => {
                if (currentIndex < fullLetter.length) {
                    letterDiv.innerHTML += fullLetter[currentIndex];
                    currentIndex++;
                    const container = document.getElementById('typewriterContainer');
                    if (container) container.scrollTop = container.scrollHeight;
                } else {
                    clearInterval(typingInterval);
                    cursorSpan.classList.add('hidden');
                    navLinks.classList.add('fade-in');
                    navLinks.style.opacity = '1';
                    for (let i = 0; i < 20; i++) {
                        setTimeout(() => spawnFloatingHeart(), i * 80);
                    }
                }
            }, 45);
        }

        function spawnFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            const icons = ['❤️', '💖', '🌸', '✨', '💗'];
            heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            heart.style.left = Math.random() * 80 + 10 + '%';
            heart.style.bottom = '5%';
            heart.style.fontSize = (Math.random() * 18 + 16) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        startBtn.addEventListener('click', startExperience);

        // Gentle floating hearts before the letter starts
        setInterval(() => {
            if (Math.random() > 0.7 && !hasStarted) spawnFloatingHeart();
        }, 2000);
    </script>
</body>
</html>
