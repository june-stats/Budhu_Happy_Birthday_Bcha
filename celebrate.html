<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Princess! ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-pink: #fecfef;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #fff0f5, #ffe4ed, #ffd9e6, #fff0f5);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            padding: 1rem;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glass card */
        .glass-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 45px rgba(255, 105, 130, 0.25);
            width: 100%;
            max-width: 460px;
            transition: all 0.3s ease;
        }

        /* Candle and flame */
        .candle {
            width: 16px;
            height: 55px;
            background: linear-gradient(to right, #ffe0b5, #ffcd94, #ffe0b5);
            margin: 0 auto;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .flame-container {
            position: absolute;
            top: -32px;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 40px;
            pointer-events: none;
        }

        .flame {
            width: 20px;
            height: 32px;
            background: radial-gradient(circle, #ff7b2c, #ff4d6d, #ffb347);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            bottom: 0;
            left: 4px;
            animation: flicker 0.5s infinite alternate;
            box-shadow: 0 0 20px #ff9f4a, 0 0 35px #ff4d6d;
        }

        .flame-inner {
            width: 10px;
            height: 14px;
            background: #fff7c0;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            bottom: 6px;
            left: 9px;
            opacity: 0.8;
            filter: blur(1px);
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-2deg); opacity: 0.85; }
            100% { transform: scale(1.12) rotate(2deg); opacity: 1; }
        }

        /* Cake layers */
        .cake-base {
            width: 180px;
            height: 28px;
            background: linear-gradient(135deg, #f7c6c6, #f5a4b2);
            border-radius: 20px;
            margin: -5px auto 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .cake-middle {
            width: 160px;
            height: 55px;
            background: linear-gradient(135deg, #fdd0da, #fcb3c4);
            border-radius: 18px 18px 12px 12px;
            margin: 0 auto;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.5), 0 5px 10px rgba(0,0,0,0.05);
        }

        .cake-top {
            width: 144px;
            height: 50px;
            background: linear-gradient(135deg, #ffe0e7, #ffccd8);
            border-radius: 16px 16px 12px 12px;
            margin: 0 auto;
            position: relative;
            top: -8px;
            box-shadow: inset 0 1px 4px rgba(255,255,255,0.6);
        }

        .icing {
            position: absolute;
            top: -8px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 18px;
            letter-spacing: 8px;
            color: #fff0e0;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }

        /* Floating hearts (background) */
        .falling-heart {
            position: absolute;
            color: #ff85a2;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Button animation */
        .hidden-btn {
            opacity: 0;
            transform: translateY(25px);
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .show-btn {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .cake-pulse {
            animation: cakePop 0.5s ease-out;
        }

        @keyframes cakePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Confetti canvas */
        canvas#confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Sparkle text */
        .sparkle-text {
            background: linear-gradient(135deg, #ff4d6d, #ff85a2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* Hint text on candle */
        .candle-hint {
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <!-- Audio elements -->
    <audio id="crackerSound" src="sounds/crackers.mp3" preload="auto"></audio>
    <audio id="birthdaySong" src="sounds/birthday_singing.mp3" loop preload="auto"></audio>

    <canvas id="confetti-canvas"></canvas>

    <div class="glass-card p-6 md:p-8 text-center relative z-20">
        <div class="mb-2">
            <h2 class="text-4xl font-['Pacifico'] text-pink-600 drop-shadow-sm">Happy Birthday!</h2>
            <p class="text-pink-400 font-bold tracking-widest mt-1 text-sm">To my favorite person</p>
        </div>

        <!-- Cake + Candle Section -->
        <div id="cakeWrapper" class="relative my-8 cursor-pointer group" onclick="blowCandle()">
            <!-- Candle with flame -->
            <div id="candleFlame" class="flame-container">
                <div class="flame"></div>
                <div class="flame-inner"></div>
            </div>
            <div class="candle"></div>

            <!-- Cake layers -->
            <div class="cake-top">
                <div class="icing">🌸</div>
            </div>
            <div class="cake-middle">
                <div class="absolute inset-0 flex items-center justify-center gap-2 text-2xl">
                    🍰 🍓
                </div>
            </div>
            <div class="cake-base"></div>

            <!-- Instruction text below cake -->
            <div class="mt-5 bg-white/40 backdrop-blur-sm rounded-full py-2 px-4 inline-block mx-auto">
                <span id="instructionText" class="text-pink-600 font-bold text-sm candle-hint flex items-center gap-2">
                    🕯️ MAKE A WISH and TAP THE CANDLE TO BLOW IT  🕯️
                </span>
            </div>
        </div>

        <!-- Sweet message -->
        <div class="bg-white/40 p-5 rounded-2xl mb-8 border border-white/50">
            <p class="text-gray-700 text-base leading-relaxed italic font-medium">
                "You make every single day brighter. Today, the world celebrates <span class="text-pink-500 font-bold">YOU</span>!"
            </p>
        </div>

        <!-- Hidden button (appears after blow) -->
        <div class="w-full hidden-btn" id="letterBtn">
            <a href="letter.html" class="w-full bg-gradient-to-r from-pink-500 to-pink-400 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-3 no-underline">
                <span>💌</span> Read My Letter
            </a>
        </div>

        <p class="mt-8 text-pink-300 text-[10px] font-bold tracking-[0.3em] uppercase">Infinite Love for You</p>
    </div>

    <script>
        // --- Confetti System (Canvas) ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;
        let confettiActive = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class ConfettiParticle {
            constructor(isBurst = false) {
                this.x = isBurst ? window.innerWidth / 2 : Math.random() * canvas.width;
                this.y = isBurst ? window.innerHeight / 2 : Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 8 + 4;
                this.speedX = (Math.random() - 0.5) * (isBurst ? 12 : 4);
                this.speedY = isBurst ? (Math.random() * -12 - 6) : (Math.random() * 3 + 2);
                this.gravity = isBurst ? 0.25 : 0.05;
                this.color = `hsl(${Math.random() * 360}, 80%, 65%)`;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 12;
                this.opacity = 1;
                this.life = 1;
            }
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                if (this.y > canvas.height + 100) this.life = 0;
                if (this.y < -100) this.life = 0;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity * this.life;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function initConfetti(count = 80) {
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push(new ConfettiParticle(false));
            }
        }

        function burstConfetti() {
            for (let i = 0; i < 180; i++) {
                particles.push(new ConfettiParticle(true));
            }
        }

        function animateConfetti() {
            if (!canvas || !ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            if (particles.length > 0 || confettiActive) {
                animationId = requestAnimationFrame(animateConfetti);
            } else {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

        function startConfettiLoop() {
            if (animationId) return;
            initConfetti(60);
            animateConfetti();
            setInterval(() => {
                if (particles.length < 150) {
                    for (let i = 0; i < 15; i++) particles.push(new ConfettiParticle(false));
                }
            }, 2000);
        }

        // --- Floating Hearts Background ---
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            const icons = ['❤️', '💖', '🌸', '✨', '💝'];
            heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 18 + 12) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.opacity = Math.random() * 0.6 + 0.3;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(createHeart, 500);

        // --- Blow Candle Logic ---
        let isBlown = false;

        function blowCandle() {
            if (isBlown) return;
            isBlown = true;

            const flame = document.getElementById('candleFlame');
            const instruction = document.getElementById('instructionText');
            const cracker = document.getElementById('crackerSound');
            const birthdaySong = document.getElementById('birthdaySong');
            const letterBtn = document.getElementById('letterBtn');
            const cakeWrapper = document.getElementById('cakeWrapper');

            // 1. Play cracker sound (burst)
            cracker.play().catch(e => console.log("Cracker sound error:", e));
            
            // 2. Extinguish flame
            flame.style.display = 'none';
            instruction.innerHTML = '🎉 WISH GRANTED! 🎉';
            instruction.classList.add('animate-bounce');
            
            // 3. Cake pop animation
            cakeWrapper.classList.add('cake-pulse');
            setTimeout(() => cakeWrapper.classList.remove('cake-pulse'), 500);
            
            // 4. Confetti explosion + continuous background confetti
            burstConfetti();
            startConfettiLoop();
            
            // 5. Flash background to golden/pink
            document.body.style.transition = 'background 0.4s';
            document.body.style.background = 'radial-gradient(circle at 30% 40%, #ffe6f0, #ffbf69)';
            setTimeout(() => {
                document.body.style.background = '';
            }, 800);
            
            // 6. Show the hidden letter button after delay
            setTimeout(() => {
                letterBtn.classList.add('show-btn');
            }, 1000);
            
            // 7. Extra hearts rain
            for (let i = 0; i < 25; i++) {
                setTimeout(createHeart, i * 60);
            }
            
            // 8. Ensure birthday singing music plays (if not already playing)
            birthdaySong.play().catch(e => console.log("Birthday song autoplay failed, but user will tap later."));
        }

        // --- Audio unlock (birthday singing on page load attempt + fallback) ---
        const birthdayAudio = document.getElementById('birthdaySong');
        
        function tryPlayBirthdaySong() {
            birthdayAudio.play().then(() => {
                console.log("Birthday song playing automatically");
            }).catch(() => {
                console.log("Auto-play blocked. Will play on any user tap.");
                const unlockAudio = () => {
                    birthdayAudio.play().catch(e => {});
                    document.removeEventListener('click', unlockAudio);
                    document.removeEventListener('touchstart', unlockAudio);
                };
                document.addEventListener('click', unlockAudio);
                document.addEventListener('touchstart', unlockAudio);
            });
        }
        
        window.addEventListener('load', () => {
            tryPlayBirthdaySong();
            // Start gentle confetti (non-burst) after load
            setTimeout(() => {
                if (!isBlown) startConfettiLoop();
            }, 1000);
        });
        
        // Also make sure cracker sound is preloaded but not played until blow.
    </script>
</body>
</html>
