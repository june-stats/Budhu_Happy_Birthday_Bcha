<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Memory Collage 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #fff5f7;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            position: relative;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #fecfef 0%, #fff5f7 100%);
            z-index: -1;
        }

        .collage-grid {
            column-count: 2;
            column-gap: 15px;
            padding: 15px;
        }

        @media (min-width: 768px) {
            .collage-grid {
                column-count: 3;
            }
        }

        .collage-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 15px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255, 133, 162, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
            padding: 5px;
            cursor: pointer;
        }

        .collage-item:active {
            transform: scale(0.95);
        }

        .collage-item img {
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        /* FLOATING HEARTS (full screen) */
        .floating-heart {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 100;
            animation: fallFullScreen linear forwards;
        }
        @keyframes fallFullScreen {
            0% {
                transform: translateY(-30px) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(calc(100vh + 50px)) rotate(360deg);
                opacity: 0;
            }
        }

        /* Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        #lightbox.active {
            display: flex;
        }
        #lightbox img {
            max-width: 100%;
            max-height: 80%;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Music visualizer (optional, for user feedback) */
        .music-visualizer {
            position: fixed;
            bottom: 15px;
            left: 15px;
            background: rgba(255,255,240,0.7);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 6px 12px;
            display: flex;
            gap: 4px;
            align-items: center;
            z-index: 200;
            cursor: pointer;
        }
        .music-bar {
            width: 4px;
            height: 12px;
            background: #ff4d6d;
            border-radius: 2px;
            animation: soundWave 0.8s infinite ease alternate;
            transform-origin: bottom;
        }
        .music-bar:nth-child(2) { animation-delay: 0.2s; height: 18px; }
        .music-bar:nth-child(3) { animation-delay: 0.4s; height: 10px; }
        .music-bar:nth-child(4) { animation-delay: 0.1s; height: 14px; }
        @keyframes soundWave {
            0% { transform: scaleY(0.5); opacity: 0.6; }
            100% { transform: scaleY(1.2); opacity: 1; }
        }
        .music-text {
            font-size: 10px;
            font-weight: bold;
            color: #ff4d6d;
            margin-left: 6px;
        }
    </style>
</head>
<body>

    <!-- Background music: autoplay, loop, volume 0.25 -->
    <audio id="bgMusic" src="sounds/collage_music.mp3" autoplay loop preload="auto"></audio>

    <!-- Music visualizer (click to toggle) -->
    <div class="music-visualizer" id="musicToggle">
        <div class="music-bar"></div>
        <div class="music-bar"></div>
        <div class="music-bar"></div>
        <div class="music-bar"></div>
        <span class="music-text">🎵 ♪</span>
    </div>

    <div class="bg-glow"></div>

    <div class="text-center py-10 px-6">
        <h1 class="text-4xl font-['Pacifico'] text-pink-500 mb-2">Our World in Frames</h1>
        <p class="text-gray-500 italic">Every picture tells a story of us... ✨</p>
    </div>

    <div class="collage-grid">
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/600?random=11" alt="Memory" loading="lazy">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/400?random=12" alt="Memory" loading="lazy">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/500?random=13" alt="Memory" loading="lazy">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/700?random=14" alt="Memory" loading="lazy">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/450?random=15" alt="Memory" loading="lazy">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/650?random=16" alt="Memory" loading="lazy">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/400?random=17" alt="Memory" loading="lazy">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/550?random=18" alt="Memory" loading="lazy">
        </div>
    </div>

    <div class="text-center py-20 px-6">
        <div class="inline-block p-8 bg-white/60 backdrop-blur-md rounded-[2.5rem] shadow-xl border border-white">
            <h2 class="text-3xl font-bold text-pink-600 mb-4">"Out of all the moments in my life...  
you are my favorite one. ❤️"</h2>
            <p class="text-gray-600 mb-8">Ready to make a million more memories?</p>
            <button onclick="restartJourney()" class="bg-pink-500 text-white px-8 py-3 rounded-full font-bold shadow-lg active:scale-95 transition-transform">
                Go back to start 🏠
            </button>
        </div>
        <p class="mt-10 text-pink-300 text-xs tracking-[0.5em] uppercase">Built with love</p>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="close-btn">&times;</span>
        <img id="lightboxImg" src="">
    </div>

    <script>
        // --- Music autoplay at 25% volume ---
        const bgMusic = document.getElementById('bgMusic');
        bgMusic.volume = 1;

        // Force autoplay on page load
        function attemptAutoPlay() {
            bgMusic.play().then(() => {
                console.log("Collage music started automatically");
            }).catch((err) => {
                console.log("Autoplay blocked (browser restriction) – music will not play automatically");
            });
        }
        window.addEventListener('load', attemptAutoPlay);
        // Also try immediately
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', attemptAutoPlay);
        } else {
            attemptAutoPlay();
        }

        // Optional: toggle music via visualizer
        const musicToggle = document.getElementById('musicToggle');
        musicToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (bgMusic.paused) {
                bgMusic.play().catch(e => console.log("Play failed"));
            } else {
                bgMusic.pause();
            }
        });

        // --- Lightbox functions ---
        function openLightbox(element) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const clickedImg = element.querySelector('img');
            lightboxImg.src = clickedImg.src;
            lightbox.classList.add('active');
            // Burst of hearts
            for (let i = 0; i < 10; i++) {
                setTimeout(createHeart, i * 100);
            }
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        // --- Full‑screen falling hearts ---
        function createFallingElement(className, iconsArray, minSize = 14, maxSize = 26, durationMin = 4, durationMax = 7) {
            const el = document.createElement('div');
            el.classList.add(className);
            el.innerHTML = iconsArray[Math.floor(Math.random() * iconsArray.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.fontSize = (Math.random() * (maxSize - minSize) + minSize) + 'px';
            const duration = Math.random() * (durationMax - durationMin) + durationMin;
            el.style.animationDuration = duration + 's';
            el.style.opacity = Math.random() * 0.7 + 0.3;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), duration * 1000);
        }

        function createHeart() {
            createFallingElement('floating-heart', ['❤️', '💖', '🌸', '✨', '💝'], 14, 28, 4.5, 7.5);
        }

        // Start continuous falling hearts
        setInterval(createHeart, 600);

        // Restart journey
        function restartJourney() {
            window.location.href = 'landing.html';
        }

        // Prevent back button from breaking flow
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function () {
            window.history.go(1);
        };
    </script>
</body>
</html>
