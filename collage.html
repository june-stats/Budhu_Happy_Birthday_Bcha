<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Memory Collage 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: #fff5f7;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #fecfef 0%, #fff5f7 100%);
            z-index: -1;
        }

        /* Masonry Grid Logic */
        .collage-grid {
            column-count: 2;
            column-gap: 15px;
            padding: 15px;
        }

        @media (min-width: 768px) {
            .collage-grid {
                column-count: 3;
            }
        }

        .collage-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 15px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255, 133, 162, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
            padding: 5px;
            cursor: pointer;
        }

        .collage-item:active {
            transform: scale(0.95);
        }

        .collage-item img {
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        /* Floating Hearts */
        .heart {
            position: absolute;
            color: #ff85a2;
            pointer-events: none;
            z-index: 10;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* Lightbox effect */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #lightbox img {
            max-width: 100%;
            max-height: 80%;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="text-center py-10 px-6">
        <h1 class="text-4xl font-['Pacifico'] text-pink-500 mb-2">Our World in Frames</h1>
        <p class="text-gray-500 italic">Every picture tells a story of us... ✨</p>
    </div>

    <div class="collage-grid">
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/600?random=11" alt="Memory">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/400?random=12" alt="Memory">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/500?random=13" alt="Memory">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/700?random=14" alt="Memory">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/450?random=15" alt="Memory">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/650?random=16" alt="Memory">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/400?random=17" alt="Memory">
        </div>
        <div class="collage-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/400/550?random=18" alt="Memory">
        </div>
    </div>

    <div class="text-center py-20 px-6">
        <div class="inline-block p-8 bg-white/60 backdrop-blur-md rounded-[2.5rem] shadow-xl border border-white">
            <h2 class="text-3xl font-bold text-pink-600 mb-4">"Out of all the moments in my life...  
you are my favorite one. ❤️"</h2>
            <p class="text-gray-600 mb-8">Ready to make a million more memories?</p>
            <button onclick="restartJourney()" class="bg-pink-500 text-white px-8 py-3 rounded-full font-bold shadow-lg active:scale-95 transition-transform">
                Go back to start 🏠
            </button>
        </div>
        <p class="mt-10 text-pink-300 text-xs tracking-[0.5em] uppercase">Built with love</p>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="close-btn">&times;</span>
        <img id="lightboxImg" src="">
    </div>

    <script>
        function openLightbox(element) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const clickedImg = element.querySelector('img');
            
            lightboxImg.src = clickedImg.src;
            lightbox.style.display = 'flex';
            
            // Burst of hearts when opening
            for(let i=0; i<10; i++) {
                setTimeout(createHeart, i * 100);
            }
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = ['❤️', '💖', '✨', '🌸'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.bottom = '0';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        // Random hearts popping from bottom
        setInterval(createHeart, 800);

        function restartJourney() {
            window.location.href = 'landing.html';
        }

        // Prevent back button from breaking the flow
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function () {
            window.history.go(1);
        };
    </script>
</body>
</html>
